services:
  db:
    image: docker.io/postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kucharka}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kucharka}
      POSTGRES_DB: ${POSTGRES_DB:-kucharka}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kucharka}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-kucharka}:${POSTGRES_PASSWORD:-kucharka}@db:5432/${POSTGRES_DB:-kucharka}?schema=public
      PORT: 3000
      UPLOAD_DIR: /app/uploads
      OCR_LANG: ces
    volumes:
      - uploads:/app/uploads
    ports:
      - "${BACKEND_PORT:-3000}:3000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: ${VITE_API_BASE:-/api}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8080}:80"

volumes:
  db-data:
  uploads:
